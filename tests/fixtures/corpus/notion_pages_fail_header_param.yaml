# Source: https://developers.notion.com/reference/post-page
# Trim date: 2026-05-17. Trimmed to expose unsupported required header parameter coverage.
openapi: 3.0.3
info:
  title: Notion Pages API
  version: '2022-06-28'
servers:
  - url: https://api.notion.com/v1
security:
  - bearerAuth: []
paths:
  /pages:
    post:
      operationId: pages_create
      parameters:
        - name: Notion-Version
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent: { type: string }
      responses:
        '200': { description: Page }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
