# Source: https://docs.github.com/en/rest/search/search
# Trim date: 2026-05-17. Trimmed to repository search with exploded primitive arrays.
openapi: 3.0.3
info:
  title: GitHub Search API
  version: '2022-11-28'
servers:
  - url: https://api.github.com
paths:
  /search/repositories:
    get:
      operationId: search_repositories
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: topic
          in: query
          required: false
          explode: true
          schema:
            type: array
            items: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200': { description: Search results }
