# Source: https://www.twilio.com/docs/messaging/api/message-resource
# Trim date: 2026-05-17. Trimmed to expose non-JSON form request body coverage.
openapi: 3.0.3
info:
  title: Twilio Messages API
  version: '2010-04-01'
servers:
  - url: https://api.twilio.com/2010-04-01
security:
  - basicAuth: []
paths:
  /Accounts/{AccountSid}/Messages.json:
    post:
      operationId: messages_create
      parameters:
        - name: AccountSid
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                To: { type: string }
                From: { type: string }
                Body: { type: string }
      responses:
        '201': { description: Message }
components:
  securitySchemes:
    basicAuth: { type: http, scheme: basic }
