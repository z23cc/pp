name: Generated Workspace Smoke

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Verification profile to run
        required: true
        default: standard
        type: choice
        options:
          - standard
          - deep
  schedule:
    # Weekly generated-artifact confidence check without slowing PRs.
    - cron: '17 8 * * 1'

jobs:
  generated-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Standard generated workspace smoke
        run: |
          cargo test --test petstore_smoke -- --ignored
          cargo test --test slicing -- --ignored
          cargo test --test bearer_smoke -- --ignored
          cargo test --test apikey_smoke -- --ignored
          cargo test --test basic_smoke -- --ignored
          cargo test --test mcp_errors -- --ignored
          cargo test --test mcp_usability -- --ignored

      - name: Deep fixture dogfood
        if: github.event_name == 'workflow_dispatch' && inputs.profile == 'deep'
        run: cargo test --test dogfood -- --ignored
